<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>P4 Ph2 (FAB) · 현장 관리</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Apple SD Gothic Neo','Pretendard',sans-serif;background:#f5f5f7;color:#1d1d1f;min-height:100vh}
.app{width:100%;max-width:480px;margin:0 auto;background:#fff;min-height:100vh;padding-bottom:80px}
.header{padding:16px 16px 0;border-bottom:1px solid #e5e5e5;background:#fff;position:sticky;top:0;z-index:10}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.logo-main{font-size:15px;font-weight:600;color:#1d1d1f;letter-spacing:-0.3px}
.logo-sub{font-size:11px;color:#86868b;margin-top:1px}
.date-badge{font-size:12px;color:#86868b;background:#f5f5f7;padding:4px 10px;border-radius:8px;border:1px solid #e5e5e5;white-space:nowrap}
.tab-bar{display:flex}
.tab{flex:1;padding:10px 4px;font-size:12px;font-weight:400;color:#86868b;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s}
.tab.active{color:#1d1d1f;font-weight:600;border-bottom-color:#1D5BA6}
.content{padding:16px}

/* TODAY */
.today-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px}
.today-title{font-size:16px;font-weight:600;color:#1d1d1f;flex:1;text-align:center}
.nav-arrow{background:none;border:1px solid #d1d1d6;border-radius:8px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#86868b;font-size:18px;flex-shrink:0}
.nav-arrow:active{background:#e5e5e5}
.progress-pill{font-size:12px;color:#1D5BA6;background:#e8f0fb;padding:3px 10px;border-radius:20px;white-space:nowrap}
.prog-bar-wrap{height:4px;background:#e5e5e5;border-radius:2px;margin-top:8px}
.prog-bar{height:100%;border-radius:2px;background:#1D5BA6;transition:width 0.3s}
.task-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid #f0f0f0;cursor:pointer;-webkit-user-select:none;user-select:none}
.task-item:last-child{border-bottom:none}
.check{width:22px;height:22px;border-radius:6px;border:1.5px solid #d1d1d6;background:#fff;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.check.done{background:#1D5BA6;border-color:#1D5BA6}
.check.done::after{content:'';display:block;width:11px;height:7px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translate(1px,-1px)}
.task-body{flex:1;min-width:0}
.task-meta{display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap}
.task-time{font-size:11px;font-weight:600;color:#1D5BA6;font-variant-numeric:tabular-nums}
.tag{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600}
.tag-fcu{background:#e8f0fb;color:#0a3d7a}
.tag-meeting{background:#fff3e0;color:#5d3a00}
.tag-edu{background:#f3f0ff;color:#3c2a8a}
.tag-admin{background:#f5f5f5;color:#3a3a3a}
.tag-inspect{background:#e8f5e9;color:#1b5e20}
.tag-off{background:#ffeaea;color:#7f1d1d}
.tag-leave{background:#fff3e0;color:#e67e22}
.task-text{font-size:14px;color:#1d1d1f;line-height:1.45}
.task-text.done-text{color:#c7c7cc;text-decoration:line-through}

/* DAILY REPORT */
.report-section{margin-top:24px;border-top:2px solid #e5e5e5;padding-top:16px}
.report-title{font-size:13px;font-weight:600;color:#1d1d1f;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.report-title::before{content:'📋';font-size:14px}
.report-list{margin-bottom:10px}
.report-item{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;background:#f5f5f7;border-radius:10px;margin-bottom:6px}
.report-item-body{flex:1;min-width:0}
.report-item-meta{font-size:11px;color:#86868b;margin-bottom:2px}
.report-item-name{font-size:11px;font-weight:600;color:#1D5BA6;margin-right:4px}
.report-item-text{font-size:13px;color:#1d1d1f;line-height:1.4;word-break:break-all}
.report-item-del{background:none;border:none;color:#c7c7cc;font-size:16px;cursor:pointer;padding:0 4px;flex-shrink:0;line-height:1}
.report-name-row{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.name-chip{padding:5px 10px;border-radius:16px;font-size:12px;border:1.5px solid #d1d1d6;background:#fff;cursor:pointer;color:#86868b;transition:all 0.12s}
.name-chip.selected{background:#1D5BA6;border-color:#1D5BA6;color:#fff;font-weight:600}
.report-input-row{display:flex;gap:8px}
.report-input{flex:1;border:1.5px solid #e5e5e5;border-radius:10px;padding:10px 12px;font-size:13px;font-family:inherit;resize:none;outline:none;background:#fafafa;color:#1d1d1f;line-height:1.4}
.report-input:focus{border-color:#1D5BA6;background:#fff}
.report-submit{background:#1D5BA6;color:#fff;border:none;border-radius:10px;padding:10px 14px;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0;align-self:flex-end}
.report-submit:active{background:#1348a0}
.report-hint{font-size:11px;color:#86868b;margin-top:6px;line-height:1.4}
.sync-indicator{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:#86868b;margin-left:8px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#2e7d32;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.sync-dot.offline{background:#e67e22;animation:none}
.sync-dot.loading{background:#1D5BA6}

/* TWO WEEK */
.week-day{margin-bottom:20px}
.week-day-label{font-size:11px;font-weight:600;color:#86868b;letter-spacing:0.5px;margin-bottom:8px}
.week-item{display:flex;align-items:flex-start;gap:10px;padding:9px 13px;background:#f5f5f7;border-radius:10px;margin-bottom:6px}
.week-time{font-size:11px;color:#1D5BA6;font-weight:600;min-width:48px;padding-top:1px;font-variant-numeric:tabular-nums}
.week-text{font-size:13px;color:#1d1d1f;line-height:1.4;flex:1}
.week-tag{font-size:10px;padding:2px 6px;border-radius:4px;margin-left:8px;flex-shrink:0;font-weight:600}
.week-divider{height:1px;background:#e5e5e5;margin:4px 0 8px}

/* CALENDAR */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-nav{background:none;border:1px solid #d1d1d6;border-radius:8px;width:30px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#86868b;font-size:16px}
.cal-month{font-size:15px;font-weight:600;color:#1d1d1f}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
.cal-dow{font-size:10px;color:#86868b;padding:4px 0;font-weight:600}
.cal-dow:first-child{color:#c0392b}
.cal-dow:last-child{color:#1D5BA6}
.cal-day{padding:4px 2px;border-radius:10px;cursor:pointer;min-height:52px;display:flex;flex-direction:column;align-items:center;gap:2px;transition:background 0.12s}
.cal-day:active{background:#e5e5e5}
.cal-day.selected{background:#e8f0fb}
.cal-day-num{font-size:13px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.cal-day.today .cal-day-num{background:#1D5BA6;color:#fff;font-size:12px}
.cal-day.selected .cal-day-num{background:#1D5BA6;color:#fff;font-size:12px}
.cal-day.sun .cal-day-num{color:#c0392b}
.cal-day.sat .cal-day-num{color:#1D5BA6}
.cal-day.off-day{background:#fff8f8}
.cal-holiday-label{font-size:9px;color:#c0392b;line-height:1.1;text-align:center;max-width:100%;word-break:keep-all}
.dot{width:5px;height:5px;border-radius:50%}
.dot-blue{background:#1D5BA6}
.dot-green{background:#2e7d32}
.dot-purple{background:#5e35b1}
.dot-red{background:#c0392b}
.dot-orange{background:#e67e22}
.dots-row{display:flex;gap:2px;flex-wrap:wrap;justify-content:center}
.cal-detail{margin-top:16px;border-top:1px solid #e5e5e5;padding-top:14px}
.cal-detail-title{font-size:14px;font-weight:600;color:#1d1d1f;margin-bottom:12px}
.cal-detail-empty{font-size:13px;color:#86868b;text-align:center;padding:24px 0}
.cal-task{display:flex;align-items:flex-start;gap:10px;padding:9px 13px;background:#f5f5f7;border-radius:10px;margin-bottom:6px}
.cal-task-time{font-size:11px;color:#1D5BA6;font-weight:600;min-width:48px;padding-top:1px;font-variant-numeric:tabular-nums}
.cal-task-body{flex:1;min-width:0}
.cal-task-text{font-size:13px;color:#1d1d1f;line-height:1.4}
.cal-task-tag{margin-top:3px}

/* LEGEND */
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#86868b}
.legend-dot{width:8px;height:8px;border-radius:2px}

/* PROGRESS */
.ref-date{font-size:11px;color:#86868b;margin-bottom:12px;text-align:right}
.total-card{background:#f5f5f7;border-radius:14px;padding:16px;display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:20px}
.stat-item{display:flex;flex-direction:column;gap:2px}
.stat-label{font-size:11px;color:#86868b}
.stat-val{font-size:22px;font-weight:600;color:#1d1d1f}
.pjt-zone{margin-bottom:16px}
.pjt-zone-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.pjt-zone-name{font-size:13px;color:#3a3a3a;font-weight:500}
.pjt-zone-pct{font-size:13px;font-weight:600;color:#1d1d1f}
.pjt-steps{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.step-bar{height:7px;border-radius:4px;background:#e5e5e5;overflow:hidden}
.step-fill{height:100%;border-radius:4px;transition:width 0.5s ease}
.step-fill-in{background:#1D5BA6}
.step-fill-an{background:#5BA4CF}
.step-fill-inst{background:#b5d4f4}
.step-label{font-size:10px;color:#86868b;margin-top:4px;text-align:center}

/* ATTENDANCE */
.att-range{font-size:11px;color:#86868b;margin-bottom:14px;text-align:center}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="logo-main">P4 Ph2 (FAB)</div>
        <div class="logo-sub">귀뚜라미범양냉방 · FCU 설치</div>
      </div>
      <span class="date-badge" id="today-badge"></span>
    </div>
    <div class="tab-bar">
      <button class="tab active" onclick="switchTab('today',this)">오늘</button>
      <button class="tab" onclick="switchTab('twoweek',this)">2주</button>
      <button class="tab" onclick="switchTab('calendar',this)">캘린더</button>
      <button class="tab" onclick="switchTab('progress',this)">공정</button>
      <button class="tab" onclick="switchTab('attend',this)">근태</button>
    </div>
  </div>

  <div class="content">

    <!-- TODAY -->
    <div id="tab-today">
      <div class="today-nav">
        <button class="nav-arrow" onclick="changeViewDay(-1)">‹</button>
        <div style="flex:1;text-align:center">
          <div class="today-title" id="today-title">오늘 일정</div>
          <div class="prog-bar-wrap"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div>
        </div>
        <button class="nav-arrow" onclick="changeViewDay(1)">›</button>
      </div>
      <div style="display:flex;justify-content:flex-end;margin-bottom:10px">
        <span class="progress-pill" id="prog-text">0 / 0</span>
      </div>
      <div id="task-list"></div>

      <!-- 업무지시 및 보고 -->
      <div class="report-section">
        <div class="report-title">
          업무지시 및 보고
          <span class="sync-indicator">
            <span class="sync-dot" id="sync-dot"></span>
            <span id="sync-label">연결 중...</span>
          </span>
        </div>
        <div class="report-list" id="report-list">
          <div style="text-align:center;color:#86868b;font-size:13px;padding:16px 0">불러오는 중...</div>
        </div>
        <!-- 이름 선택 -->
        <div class="report-name-row" id="name-chips">
          <span class="name-chip" onclick="selectName(this)" data-name="이경택 소장">이경택 소장</span>
          <span class="name-chip" onclick="selectName(this)" data-name="김종화 차장">김종화 차장</span>
          <span class="name-chip" onclick="selectName(this)" data-name="윤석원 과장">윤석원 과장</span>
          <span class="name-chip" onclick="selectName(this)" data-name="정다애 대리">정다애 대리</span>
          <span class="name-chip" onclick="selectName(this)" data-name="이한영 사원">이한영 사원</span>
          <span class="name-chip" onclick="selectName(this)" data-name="김영서 사원">김영서 사원</span>
        </div>
        <div class="report-input-row">
          <textarea class="report-input" id="report-input" rows="2" placeholder="업무지시 또는 보고 내용을 입력하세요..."></textarea>
          <button class="report-submit" onclick="submitReport()">등록</button>
        </div>
        <div class="report-hint">💡 중요한 내용은 춘식이에게 전달하면 일정에 저장해 드려요</div>
      </div>
    </div>

    <!-- TWO WEEK -->
    <div id="tab-twoweek" style="display:none"></div>

    <!-- CALENDAR -->
    <div id="tab-calendar" style="display:none">
      <div class="cal-header">
        <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
        <span class="cal-month" id="cal-month-label"></span>
        <button class="cal-nav" onclick="changeMonth(1)">›</button>
      </div>
      <div class="legend">
        <span class="legend-item"><span class="legend-dot" style="background:#1D5BA6"></span>반입</span>
        <span class="legend-item"><span class="legend-dot" style="background:#2e7d32"></span>검수</span>
        <span class="legend-item"><span class="legend-dot" style="background:#5e35b1"></span>교육</span>
        <span class="legend-item"><span class="legend-dot" style="background:#c0392b"></span>휴무</span>
        <span class="legend-item"><span class="legend-dot" style="background:#e67e22"></span>연차</span>
      </div>
      <div class="cal-grid" id="cal-grid">
        <div class="cal-dow">일</div><div class="cal-dow">월</div><div class="cal-dow">화</div>
        <div class="cal-dow">수</div><div class="cal-dow">목</div><div class="cal-dow">금</div><div class="cal-dow">토</div>
      </div>
      <div class="cal-detail" id="cal-detail" style="display:none">
        <div class="cal-detail-title" id="cal-detail-title"></div>
        <div id="cal-detail-body"></div>
      </div>
    </div>

    <!-- ATTENDANCE -->
    <div id="tab-attend" style="display:none">
      <div class="att-range" id="att-range"></div>
      <div id="att-list"></div>
    </div>

    <!-- PROGRESS -->
    <div id="tab-progress" style="display:none">
      <div class="ref-date">기준일: 2026-06-19</div>
      <div class="total-card">
        <div class="stat-item"><span class="stat-label">총 설치 대상</span><span class="stat-val">183대</span></div>
        <div class="stat-item"><span class="stat-label">누적 반입</span><span class="stat-val" id="total-in">—</span></div>
        <div class="stat-item"><span class="stat-label">전체 공정율</span><span class="stat-val" id="total-pct">—</span></div>
        <div class="stat-item"><span class="stat-label">완료 구역</span><span class="stat-val" id="done-zones">0</span></div>
      </div>
      <div class="legend">
        <span class="legend-item"><span class="legend-dot" style="background:#1D5BA6"></span>반입</span>
        <span class="legend-item"><span class="legend-dot" style="background:#5BA4CF"></span>안착</span>
        <span class="legend-item"><span class="legend-dot" style="background:#b5d4f4"></span>설치</span>
      </div>
      <div id="zone-list"></div>
    </div>

  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy, serverTimestamp, setDoc, getDoc }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// =====================================================
// 🔥 FIREBASE CONFIG — 아래 값을 Firebase Console에서 복사해 붙여넣으세요
// =====================================================
const firebaseConfig = {
  apiKey: "AIzaSyCyQxBJ_ftfM0ImBXubmqD5gfzFR54iPmE",
  authDomain: "p4ph2-fab-506a7.firebaseapp.com",
  projectId: "p4ph2-fab-506a7",
  storageBucket: "p4ph2-fab-506a7.firebasestorage.app",
  messagingSenderId: "36946317914",
  appId: "1:36946317914:web:c6ad5f3a1b98130c99fe63"
};
// =====================================================

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Firebase 연결 상태를 전역에 노출
window._fbDb = db;
window._fbReady = true;

// ===== 보고사항 — 날짜별 실시간 구독 =====
// Firestore 컬렉션: daily_reports_{날짜키}  예) daily_reports_2026-06-23
// 날짜가 바뀔 때마다 구독 대상 교체

let _reportUnsub = null;

window._fbSubscribeReports = function(dateKey) {
  // 이전 구독 해제
  if (_reportUnsub) { _reportUnsub(); _reportUnsub = null; }

  // 로딩 표시
  renderReportList(null);

  const colName = 'daily_reports_' + dateKey;
  const q = query(collection(db, colName), orderBy('ts', 'desc'));

  _reportUnsub = onSnapshot(q, (snapshot) => {
    const reports = [];
    snapshot.forEach(d => reports.push({ id: d.id, colName, ...d.data() }));
    window._currentReportDateKey = dateKey;
    renderReportList(reports);
    setSyncStatus('online');
  }, (err) => {
    console.error('보고사항 구독 오류:', err);
    setSyncStatus('offline');
    renderReportList(getLocalReports(dateKey));
  });
};

// 보고사항 등록 (날짜 컬렉션에 저장)
window.submitReport = async function() {
  const input = document.getElementById('report-input');
  const text = input.value.trim();
  const name = window._selectedName || '';
  if (!text) return;
  if (!name) { alert('이름을 먼저 선택해 주세요'); return; }

  const dateKey = window._currentReportDateKey || window._currentCheckKey || '';
  const btn = document.querySelector('.report-submit');
  btn.textContent = '저장중';
  btn.disabled = true;

  try {
    if (window._fbDb && dateKey) {
      const now = new Date();
      const timeStr = now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');
      await addDoc(collection(db, 'daily_reports_' + dateKey), {
        text, name, time: timeStr, ts: serverTimestamp()
      });
    } else {
      // 오프라인 fallback
      const now = new Date();
      const timeStr = now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');
      const local = getLocalReports(dateKey);
      local.unshift({ text, name, time: timeStr, ts: Date.now(), id: 'local_'+Date.now(), colName: 'daily_reports_'+dateKey });
      if (local.length > 30) local.splice(30);
      saveLocalReports(dateKey, local);
      renderReportList(local);
    }
    input.value = '';
  } catch(e) {
    console.error(e);
    alert('저장 실패. 네트워크를 확인해 주세요.');
  } finally {
    btn.textContent = '등록';
    btn.disabled = false;
  }
};

// 보고사항 삭제
window.deleteReport = async function(id, colName) {
  if (!id) return;
  if (id.startsWith('local_')) {
    const dateKey = window._currentReportDateKey || '';
    const local = getLocalReports(dateKey).filter(r => r.id !== id);
    saveLocalReports(dateKey, local);
    renderReportList(local);
    return;
  }
  try {
    await deleteDoc(doc(db, colName, id));
  } catch(e) { console.error(e); alert('삭제 실패'); }
};

function setSyncStatus(status) {
  const dot = document.getElementById('sync-dot');
  const label = document.getElementById('sync-label');
  if (!dot || !label) return;
  if (status === 'online') {
    dot.className = 'sync-dot'; dot.style.background = '#2e7d32';
    label.textContent = '실시간 동기화';
  } else if (status === 'loading') {
    dot.className = 'sync-dot loading'; dot.style.background = '#1D5BA6';
    label.textContent = '연결 중...';
  } else {
    dot.className = 'sync-dot offline'; dot.style.background = '#e67e22';
    label.textContent = '오프라인 모드';
  }
}

function renderReportList(reports) {
  const el = document.getElementById('report-list');
  if (!el) return;
  // null = 로딩 중
  if (reports === null) {
    el.innerHTML = '<div style="font-size:12px;color:#86868b;padding:10px 0">불러오는 중...</div>';
    return;
  }
  if (!reports.length) {
    el.innerHTML = '<div style="font-size:12px;color:#86868b;padding:6px 0 8px">아직 등록된 내용이 없어요</div>';
    return;
  }
  el.innerHTML = reports.map(r => `
    <div class="report-item">
      <div class="report-item-body">
        <div class="report-item-meta">
          <span class="report-item-name">${r.name || '—'}</span>${r.time || ''}
        </div>
        <div class="report-item-text">${r.text}</div>
      </div>
      <button class="report-item-del" onclick="deleteReport('${r.id}','${r.colName||''}')" title="삭제">×</button>
    </div>`).join('');
}

// localStorage fallback (날짜별)
function getLocalReports(dateKey) {
  try { return JSON.parse(localStorage.getItem('reports_'+(dateKey||'')) || '[]'); } catch(e) { return []; }
}
function saveLocalReports(dateKey, arr) {
  try { localStorage.setItem('reports_'+(dateKey||''), JSON.stringify(arr)); } catch(e) {}
}

// ===== 체크리스트 상태 Firebase 연동 =====
// Firestore 컬렉션: checklist_state / 문서 ID: 날짜키(2026-06-23)
// 구조: { checks: [0, 2, 3] }  ← 완료된 항목 인덱스 배열

// 날짜별 체크 상태 실시간 구독 (날짜가 바뀔 때마다 호출)
let _checkUnsub = null;

window._fbSubscribeChecks = function(dateKey) {
  // 이전 구독 해제
  if (_checkUnsub) { _checkUnsub(); _checkUnsub = null; }

  const checkDoc = doc(db, 'checklist_state', dateKey);
  _checkUnsub = onSnapshot(checkDoc, (snap) => {
    const checks = snap.exists() ? (snap.data().checks || []) : [];
    // 전역 캐시 업데이트
    window._checkCache = window._checkCache || {};
    window._checkCache[dateKey] = checks;
    // 현재 보고 있는 날짜와 일치할 때만 UI 갱신
    if (window._currentCheckKey === dateKey) {
      applyChecksToUI(dateKey, checks);
    }
  }, (err) => {
    console.error('체크리스트 구독 오류:', err);
  });
};

window._fbSetCheck = async function(dateKey, idx, isDone) {
  try {
    const checkDoc = doc(db, 'checklist_state', dateKey);
    const snap = await getDoc(checkDoc);
    let checks = snap.exists() ? (snap.data().checks || []) : [];
    if (isDone) {
      if (!checks.includes(idx)) checks.push(idx);
    } else {
      checks = checks.filter(i => i !== idx);
    }
    await setDoc(checkDoc, { checks, updatedAt: serverTimestamp() });
    // 로컬 캐시도 즉시 업데이트 (실시간 구독 오기 전에 UI 반영)
    window._checkCache = window._checkCache || {};
    window._checkCache[dateKey] = checks;
  } catch(e) {
    console.error('체크 저장 오류:', e);
    // 오프라인 fallback: localStorage
    const arr = JSON.parse(localStorage.getItem('checks_'+dateKey)||'[]');
    if (isDone) { if(!arr.includes(idx)) arr.push(idx); }
    else { const p=arr.indexOf(idx); if(p>-1) arr.splice(p,1); }
    localStorage.setItem('checks_'+dateKey, JSON.stringify(arr));
  }
};

window._fbGetChecks = function(dateKey) {
  // 캐시 우선, 없으면 localStorage fallback
  if (window._checkCache && window._checkCache[dateKey] !== undefined) {
    return window._checkCache[dateKey];
  }
  try { return JSON.parse(localStorage.getItem('checks_'+dateKey)||'[]'); } catch(e) { return []; }
};

function applyChecksToUI(dateKey, checks) {
  const items = document.querySelectorAll('#task-list .task-item');
  items.forEach((el, idx) => {
    const chk = el.querySelector('.check');
    const txt = el.querySelector('.task-text');
    if (!chk || !txt) return;
    const isDone = checks.includes(idx);
    if (isDone) { chk.classList.add('done'); txt.classList.add('done-text'); }
    else { chk.classList.remove('done'); txt.classList.remove('done-text'); }
  });
  updateProgress();
}

</script>

  '2026-08-11':[{time:'19:00',text:'(2F 제조부속실) FCU 8EA 반입(817~824)',tag:'fcu',tagLabel:'반입'}],
  '2026-08-12':[{time:'10:00',text:'(2F 제조부속실) FCU 16EA 입고검사(801~802,811~824)',tag:'inspect',tagLabel:'검수'}],
};

// ===== 2026년 한국 공휴일 =====
const HOLIDAYS={
  '2026-01-01':'신정','2026-01-28':'설날 연휴','2026-01-29':'설날','2026-01-30':'설날 연휴',
  '2026-03-01':'삼일절','2026-05-05':'어린이날','2026-05-24':'부처님오신날',
  '2026-06-06':'현충일','2026-08-15':'광복절',
  '2026-09-24':'추석 연휴','2026-09-25':'추석','2026-09-26':'추석 연휴',
  '2026-10-03':'개천절','2026-10-09':'한글날','2026-12-25':'크리스마스',
};

// ===== 유틸 =====
function pad(n){return String(n).padStart(2,'0');}
function toKey(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function getAppToday(){
  const now=new Date();
  if(now.getHours()<6)now.setDate(now.getDate()-1);
  now.setHours(0,0,0,0);return now;
}
function getLeavesFromSchedule(key){
  return(ALL_SCHEDULE[key]||[]).filter(i=>i.tag==='leave'&&i.leaveInfo).map(i=>i.leaveInfo);
}

// ===== 이름 선택 =====
window._selectedName='';
window.selectName=function(el){
  document.querySelectorAll('.name-chip').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  window._selectedName=el.dataset.name;
  // 마지막 선택 이름 기억
  try{localStorage.setItem('lastReportName',window._selectedName);}catch(e){}
};
// 페이지 로드 시 마지막 선택 이름 복원
(function(){
  try{
    const last=localStorage.getItem('lastReportName');
    if(last){
      window._selectedName=last;
      // DOM 준비 후 적용
      document.addEventListener('DOMContentLoaded',()=>{
        const chip=document.querySelector(`.name-chip[data-name="${last}"]`);
        if(chip)chip.classList.add('selected');
      });
    }
  }catch(e){}
})();

// ===== TODAY =====
let viewDayOffset=0;
function getViewDate(){const b=getAppToday();b.setDate(b.getDate()+viewDayOffset);return b;}
window.changeViewDay=function(dir){viewDayOffset+=dir;renderToday();};

function initToday(){viewDayOffset=0;renderToday();}

function renderToday(){
  const d=getViewDate();
  const days=['일','월','화','수','목','금','토'];
  const weekNum=getWeekNum(d);
  const key=toKey(d);
  const realToday=getAppToday();
  document.getElementById('today-badge').textContent=
    realToday.getFullYear()+'. '+(realToday.getMonth()+1)+'. '+realToday.getDate()+' ('+days[realToday.getDay()]+')';
  document.getElementById('today-title').textContent=
    'W'+weekNum+' · '+(d.getMonth()+1)+'월 '+d.getDate()+'일('+days[d.getDay()]+')';

  const items=ALL_SCHEDULE[key]||[];
  const timed=items.filter(i=>i.time);
  const notimed=items.filter(i=>!i.time);
  // Firebase 구독 시작 (날짜별)
  window._currentCheckKey=key;
  if(window._fbSubscribeChecks) window._fbSubscribeChecks(key);
  // 보고사항도 날짜별 구독 교체
  window._currentReportDateKey=key;
  if(window._fbSubscribeReports) window._fbSubscribeReports(key);
  const savedChecks=(window._fbGetChecks?window._fbGetChecks(key):[])||[];
  const list=document.getElementById('task-list');
  if(!items.length){
    list.innerHTML='<div style="text-align:center;color:#86868b;font-size:13px;padding:32px 0">등록된 일정이 없어요</div>';
    document.getElementById('prog-text').textContent='0 / 0';
    document.getElementById('prog-bar').style.width='0%';
    return;
  }
  list.innerHTML='';
  const mkItem=(i,idx)=>{
    const div=document.createElement('div');div.className='task-item';
    const isDone=savedChecks.includes(idx);
    div.innerHTML=`<div class="check${isDone?' done':''}"></div><div class="task-body">
      <div class="task-meta">${i.time?`<span class="task-time">${i.time}</span>`:''}<span class="tag tag-${i.tag}">${i.tagLabel}</span></div>
      <div class="task-text${isDone?' done-text':''}">${i.text}</div></div>`;
    div.onclick=()=>toggleTask(div,key,idx);
    return div;
  };
  let gi=0;
  timed.forEach(i=>{list.appendChild(mkItem(i,gi));gi++;});
  if(notimed.length){
    const sep=document.createElement('div');sep.style.cssText='height:1px;background:#f0f0f0;margin:4px 0 8px';
    list.appendChild(sep);
    notimed.forEach(i=>{list.appendChild(mkItem(i,gi));gi++;});
  }
  updateProgress();
}
function toggleTask(el,key,idx){
  const chk=el.querySelector('.check');
  const txt=el.querySelector('.task-text');
  const willDone=!chk.classList.contains('done');
  chk.classList.toggle('done');
  txt.classList.toggle('done-text');
  // Firebase 저장 (없으면 localStorage fallback)
  if(window._fbSetCheck){
    window._fbSetCheck(key,idx,willDone);
  } else {
    try{
      const arr=JSON.parse(localStorage.getItem('checks_'+key)||'[]');
      if(willDone){if(!arr.includes(idx))arr.push(idx);}
      else{const p=arr.indexOf(idx);if(p>-1)arr.splice(p,1);}
      localStorage.setItem('checks_'+key,JSON.stringify(arr));
    }catch(e){}
  }
  updateProgress();
}
function updateProgress(){
  const total=document.querySelectorAll('#task-list .task-item').length;
  const done=document.querySelectorAll('#task-list .check.done').length;
  document.getElementById('prog-bar').style.width=(total?Math.round(done/total*100):0)+'%';
  document.getElementById('prog-text').textContent=done+' / '+total;
}
function getWeekNum(d){const j=new Date(d.getFullYear(),0,1);return Math.ceil(((d-j)/86400000+j.getDay()+1)/7);}

// ===== TWO WEEK =====
function renderTwoWeek(){
  const el=document.getElementById('tab-twoweek');
  const now=getAppToday();const dates=[];
  for(let i=0;i<14;i++){const d=new Date(now);d.setDate(now.getDate()+i);dates.push(d);}
  const days=['일','월','화','수','목','금','토'];
  el.innerHTML=dates.map(d=>{
    const key=toKey(d);const items=ALL_SCHEDULE[key]||[];if(!items.length)return'';
    const timed=items.filter(i=>i.time);const notimed=items.filter(i=>!i.time);
    const wn=getWeekNum(d);
    const label=(d.getMonth()+1)+'월 '+d.getDate()+'일('+days[d.getDay()]+') · W'+wn;
    const mkRow=i=>`<div class="week-item"><span class="week-time">${i.time||'—'}</span><span class="week-text">${i.text}</span><span class="week-tag tag-${i.tag}">${i.tagLabel}</span></div>`;
    return`<div class="week-day"><div class="week-day-label">${label}</div>${timed.map(mkRow).join('')}${notimed.length?`<div class="week-divider"></div>${notimed.map(mkRow).join('')}`:''}</div>`;
  }).join('');
  if(!el.innerHTML.trim())el.innerHTML='<div style="text-align:center;color:#86868b;font-size:13px;padding:32px 0">2주 내 등록된 일정이 없어요</div>';
}

// ===== CALENDAR =====
let curMonth,curYear,selectedKey=null;
function initCal(){const now=getAppToday();curMonth=now.getMonth();curYear=now.getFullYear();renderCal();}
function getDots(key){
  const types=new Set();
  const dateObj=new Date(key.replace(/-/g,'/'));
  const dow=dateObj.getDay();
  const isOff=dow===0||dow===6||!!HOLIDAYS[key]||(ALL_SCHEDULE[key]||[]).some(i=>i.tag==='off');
  if(isOff)types.add('off');
  (ALL_SCHEDULE[key]||[]).forEach(i=>{
    if(i.tag==='fcu')types.add('in');
    else if(i.tag==='inspect')types.add('check');
    else if(i.tag==='edu')types.add('edu');
    else if(i.tag==='leave')types.add('leave');
  });
  if(getLeavesFromSchedule(key).length)types.add('leave');
  return[...types];
}
const DOT_MAP={in:'dot-blue',check:'dot-green',edu:'dot-purple',off:'dot-red',leave:'dot-orange'};
function renderCal(){
  const months=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('cal-month-label').textContent=curYear+'년 '+months[curMonth];
  const grid=document.getElementById('cal-grid');
  const dows=[...grid.querySelectorAll('.cal-dow')];
  grid.innerHTML='';dows.forEach(d=>grid.appendChild(d));
  const first=new Date(curYear,curMonth,1).getDay();
  const daysInMonth=new Date(curYear,curMonth+1,0).getDate();
  const today=getAppToday();
  for(let i=0;i<first;i++){const b=document.createElement('div');b.className='cal-day';grid.appendChild(b);}
  for(let d=1;d<=daysInMonth;d++){
    const key=curYear+'-'+pad(curMonth+1)+'-'+pad(d);
    const dateObj=new Date(curYear,curMonth,d);const dow=dateObj.getDay();
    const cell=document.createElement('div');cell.className='cal-day';
    if(dow===0)cell.classList.add('sun');
    if(dow===6)cell.classList.add('sat');
    const isToday=today.getFullYear()===curYear&&today.getMonth()===curMonth&&today.getDate()===d;
    if(key===selectedKey)cell.classList.add('selected');
    else if(isToday)cell.classList.add('today');
    const isOff=dow===0||dow===6||!!HOLIDAYS[key]||(ALL_SCHEDULE[key]||[]).some(i=>i.tag==='off');
    if(isOff&&key!==selectedKey&&!isToday)cell.classList.add('off-day');
    const num=document.createElement('div');num.className='cal-day-num';num.textContent=d;cell.appendChild(num);
    if(HOLIDAYS[key]){
      const lbl=document.createElement('div');lbl.className='cal-holiday-label';lbl.textContent=HOLIDAYS[key];cell.appendChild(lbl);
    }
    const dots=getDots(key);
    if(dots.length){
      const row=document.createElement('div');row.className='dots-row';
      dots.filter(e=>e!=='off').forEach(e=>{const dot=document.createElement('div');dot.className='dot '+(DOT_MAP[e]||'dot-blue');row.appendChild(dot);});
      cell.appendChild(row);
    }
    cell.onclick=()=>{selectedKey=selectedKey===key?null:key;renderCal();selectedKey?renderCalDetail(selectedKey):hideDetail();};
    grid.appendChild(cell);
  }
  if(selectedKey){const[sy,sm]=selectedKey.split('-').map(Number);if(sm-1!==curMonth||sy!==curYear)hideDetail();else renderCalDetail(selectedKey);}
}
function renderCalDetail(key){
  const[y,m,d]=key.split('-').map(Number);
  const dows=['일','월','화','수','목','금','토'];
  const dow=dows[new Date(y,m-1,d).getDay()];
  const holidayName=HOLIDAYS[key]||'';
  document.getElementById('cal-detail-title').textContent=m+'월 '+d+'일('+dow+')'+(holidayName?' · '+holidayName:'');
  const items=ALL_SCHEDULE[key]||[];
  const dateObj=new Date(y,m-1,d);const dayOfWeek=dateObj.getDay();
  const autoOff=(dayOfWeek===0||dayOfWeek===6||!!HOLIDAYS[key])&&!items.some(i=>i.tag==='off');
  const allItems=[...items];
  if(autoOff)allItems.unshift({time:null,text:'휴무'+(dayOfWeek===0?' (일요일)':dayOfWeek===6?' (토요일)':holidayName?' ('+holidayName+')':''),tag:'off',tagLabel:'휴무'});
  const leaves=getLeavesFromSchedule(key);
  const LEAVE_LABEL={'annual':'연차','half-am':'오전 반차','half-pm':'오후 반차'};
  const LEAVE_COLOR={'annual':'#c0392b','half-am':'#e67e22','half-pm':'#8e44ad'};
  const LEAVE_BG={'annual':'#ffeaea','half-am':'#fff3e0','half-pm':'#f3f0ff'};
  const body=document.getElementById('cal-detail-body');
  if(!allItems.filter(i=>i.tag!=='leave').length&&!leaves.length){
    body.innerHTML='<div class="cal-detail-empty">등록된 일정이 없어요</div>';
  } else {
    const timed=allItems.filter(i=>i.time&&i.tag!=='leave');
    const notimed=allItems.filter(i=>!i.time&&i.tag!=='leave');
    const mk=i=>`<div class="cal-task"><span class="cal-task-time">${i.time||'—'}</span><div class="cal-task-body"><div class="cal-task-text">${i.text}</div><div class="cal-task-tag"><span class="tag tag-${i.tag}">${i.tagLabel}</span></div></div></div>`;
    let html=timed.map(mk).join('');
    if(notimed.length)html+=`<div style="height:1px;background:#e5e5e5;margin:6px 0 8px"></div>`+notimed.map(mk).join('');
    if(leaves.length){
      html+=`<div style="height:1px;background:#e5e5e5;margin:6px 0 8px"></div>`;
      leaves.forEach(l=>{html+=`<div class="cal-task"><span class="cal-task-time">—</span><div class="cal-task-body"><div class="cal-task-text">${l.name}</div><div class="cal-task-tag"><span class="tag" style="background:${LEAVE_BG[l.type]};color:${LEAVE_COLOR[l.type]}">${LEAVE_LABEL[l.type]}</span></div></div></div>`;});
    }
    body.innerHTML=html;
  }
  document.getElementById('cal-detail').style.display='block';
}
function hideDetail(){document.getElementById('cal-detail').style.display='none';}
function changeMonth(dir){curMonth+=dir;if(curMonth>11){curMonth=0;curYear++;}if(curMonth<0){curMonth=11;curYear--;}selectedKey=null;renderCal();}

// ===== PROGRESS =====
function renderProgress(){
  const list=document.getElementById('zone-list');list.innerHTML='';
  let ts=0,ds=0,totalIn=0,doneZones=0;
  ZONES.forEach(z=>{
    const mx=z.total*3;const done=z.반입+z.안착+z.설치;
    ts+=mx;ds+=done;totalIn+=z.반입;
    if(z.설치===z.total&&z.total>0)doneZones++;
    const pct=(done/mx*100).toFixed(1);
    const div=document.createElement('div');div.className='pjt-zone';
    div.innerHTML=`<div class="pjt-zone-header"><span class="pjt-zone-name">${z.name} <span style="color:#86868b;font-size:11px;font-weight:400">(${z.total}대)</span></span><span class="pjt-zone-pct">${pct}%</span></div>
    <div class="pjt-steps">
      <div><div class="step-bar"><div class="step-fill step-fill-in" style="width:${(z.반입/z.total*100).toFixed(1)}%"></div></div><div class="step-label">반입 ${z.반입}/${z.total}</div></div>
      <div><div class="step-bar"><div class="step-fill step-fill-an" style="width:${(z.안착/z.total*100).toFixed(1)}%"></div></div><div class="step-label">안착 ${z.안착}/${z.total}</div></div>
      <div><div class="step-bar"><div class="step-fill step-fill-inst" style="width:${(z.설치/z.total*100).toFixed(1)}%"></div></div><div class="step-label">설치 ${z.설치}/${z.total}</div></div>
    </div>`;
    list.appendChild(div);
  });
  document.getElementById('total-pct').textContent=(ds/ts*100).toFixed(1)+'%';
  document.getElementById('total-in').textContent=totalIn+'대';
  document.getElementById('done-zones').textContent=doneZones;
}

// ===== ATTENDANCE =====
const LEAVE_LABEL_MAP={'annual':'연차','half-am':'오전 반차','half-pm':'오후 반차'};
const LEAVE_COLOR_MAP={'annual':'#c0392b','half-am':'#e67e22','half-pm':'#8e44ad'};
const LEAVE_BG_MAP={'annual':'#ffeaea','half-am':'#fff3e0','half-pm':'#f3f0ff'};
function renderAttend(){
  const now=getAppToday();const todayKey=toKey(now);
  const days=['일','월','화','수','목','금','토'];
  const list=[];for(let i=-7;i<=7;i++){const d=new Date(now);d.setDate(now.getDate()+i);list.push(d);}
  const start=list[0],end=list[list.length-1];
  document.getElementById('att-range').textContent=(start.getMonth()+1)+'월 '+start.getDate()+'일 ~ '+(end.getMonth()+1)+'월 '+end.getDate()+'일';
  const el=document.getElementById('att-list');
  const daysWithLeave=list.filter(d=>getLeavesFromSchedule(toKey(d)).length>0);
  if(!daysWithLeave.length){
    el.innerHTML='<div style="text-align:center;color:#86868b;font-size:13px;padding:40px 0">이 기간 내 휴가 신청이 없어요</div>';return;
  }
  el.innerHTML=daysWithLeave.map(d=>{
    const key=toKey(d);const isToday=key===todayKey;
    const leaves=getLeavesFromSchedule(key);
    const dateLabel=(d.getMonth()+1)+'월 '+d.getDate()+'일('+days[d.getDay()]+')';
    const leaveItems=leaves.map(l=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0;">
      <span style="font-size:13px;color:#1d1d1f;font-weight:500">${l.name}</span>
      <span style="font-size:11px;font-weight:600;padding:3px 10px;border-radius:10px;background:${LEAVE_BG_MAP[l.type]};color:${LEAVE_COLOR_MAP[l.type]}">${LEAVE_LABEL_MAP[l.type]}</span></div>`).join('');
    return`<div style="background:${isToday?'#f0f6ff':'#f5f5f7'};border-radius:12px;padding:12px 14px;margin-bottom:10px;${isToday?'border:1.5px solid #1D5BA6':''}">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">${isToday?'<div style="width:6px;height:6px;border-radius:50%;background:#1D5BA6"></div>':''}
        <span style="font-size:13px;font-weight:600;color:${isToday?'#1D5BA6':'#1d1d1f'}">${dateLabel}</span>
        <span style="font-size:11px;color:#86868b">${leaves.length}명</span></div>
      <div>${leaveItems}</div></div>`;
  }).join('');
}

// ===== TAB =====
function switchTab(name,btn){
  ['today','twoweek','calendar','progress','attend'].forEach(t=>{document.getElementById('tab-'+t).style.display=t===name?'block':'none';});
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(name==='twoweek')renderTwoWeek();
  if(name==='calendar')initCal();
  if(name==='progress')renderProgress();
  if(name==='attend')renderAttend();
}

// INIT — Firebase module이 준비된 후 initToday 호출
// type="module" 스크립트는 defer와 동일하게 동작하므로
// 일반 스크립트에서 window._fbSubscribeReports가 아직 없을 수 있음
// → 짧은 polling으로 Firebase 준비 후 실행
function waitForFirebaseAndInit() {
  if (window._fbSubscribeReports && window._fbSubscribeChecks) {
    initToday();
  } else {
    setTimeout(waitForFirebaseAndInit, 50);
  }
}
waitForFirebaseAndInit();
renderProgress();

document.getElementById('report-input').addEventListener('keydown',e=>{
