<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><title>Firebase 진단</title>
<style>body{font-family:monospace;padding:20px;background:#f5f5f5;}
.ok{color:#2e7d32;font-weight:700;} .err{color:#c0392b;font-weight:700;}
pre{background:#fff;padding:12px;border-radius:8px;font-size:13px;white-space:pre-wrap;word-break:break-all;}
</style></head>
<body>
<h2>🔥 Firebase worker_attendance 진단</h2>
<div id="out">로딩 중...</div>
<script type="module">
import { initializeApp, getApps, getApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, getDoc, collection, getDocs }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const CFG = {
  apiKey:"AIzaSyCyQxBJ_ftfM0ImBXubmqD5gfzFR54iPmE",
  authDomain:"p4ph2-fab-506a7.firebaseapp.com",
  projectId:"p4ph2-fab-506a7",
  storageBucket:"p4ph2-fab-506a7.firebasestorage.app",
  messagingSenderId:"36946317914",
  appId:"1:36946317914:web:c6ad5f3a1b98130c99fe63"
};

let app;
try { app = getApp('fbtest'); } catch(e) { app = initializeApp(CFG,'fbtest'); }
const db = getFirestore(app);
const out = document.getElementById('out');

async function run(){
  let html = '';

  // 1. 특정 날짜 직접 조회
  const testDates = ['2026-06-21','2026-06-22','2026-06-23'];
  html += '<h3>특정 날짜 getDoc 테스트</h3>';
  for(const key of testDates){
    try {
      const snap = await getDoc(doc(db,'worker_attendance',key));
      if(snap.exists()){
        const checks = snap.data().checks || [];
        html += `<p class="ok">✓ ${key} — 존재함, checks: [${checks.join(', ')}] (${checks.length}명)</p>`;
      } else {
        html += `<p class="err">✗ ${key} — 문서 없음</p>`;
      }
    } catch(e){
      html += `<p class="err">✗ ${key} — 오류: ${e.code} ${e.message}</p>`;
    }
  }

  // 2. 컬렉션 전체 목록
  html += '<h3>worker_attendance 컬렉션 전체 문서</h3>';
  try {
    const snap = await getDocs(collection(db,'worker_attendance'));
    if(snap.empty){
      html += '<p class="err">컬렉션이 비어있거나 접근 불가</p>';
    } else {
      snap.forEach(d => {
        const checks = d.data().checks || [];
        html += `<p class="ok">📄 ${d.id} — ${checks.length}명: [${checks.join(', ')}]</p>`;
      });
    }
  } catch(e){
    html += `<p class="err">컬렉션 조회 오류: ${e.code} — ${e.message}</p>`;
  }

  out.innerHTML = html;
}
run();
</script>
</body>
</html>
